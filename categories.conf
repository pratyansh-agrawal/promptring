# ════════════════════════════════════════════════════════════════════
#  Copilot CLI — notification categories
# ════════════════════════════════════════════════════════════════════
#  Edit freely. Each line defines one notification scenario.
#
#  Format (pipe-delimited, spaces around pipes are trimmed):
#      key | emoji | title | subtitle | sound
#
#  - key      : short id the agent passes (e.g. done, input, ready…)
#  - emoji    : prepended to the title to keep things pretty
#  - title    : bold first line of the banner
#  - subtitle : second line — the human-readable category label
#  - sound    : a sound NAME, resolved (first hit wins) from:
#                 1. bundled  sounds/<name>.{wav,aiff,mp3,m4a}
#                 2. user     ~/Library/Sounds/<name>.aiff
#                 3. system   /System/Library/Sounds/<name>.aiff
#               or "-" for silent.
#
#  Delivery is terminal-native (no third-party app / osascript / brew):
#  the banner is written as an escape sequence straight to the terminal's
#  PTY, the Dock icon bounces, and `afplay` plays the per-category sound.
#
#  Default sound "tring" ships with the package (sounds/tring.mp3), so it
#  works standalone. You may also use any macOS system sound name:
#    Basso Blow Bottle Frog Funk Glass Hero Morse
#    Ping Pop Purr Sosumi Submarine Tink
#  (or drop a custom file in sounds/ or ~/Library/Sounds and name it here)
#
#  Lines starting with # and blank lines are ignored.
# ════════════════════════════════════════════════════════════════════

# key      | emoji | title    | subtitle              | sound
done       | ✅  | Copilot  | Task complete         | tring
input      | 🟡  | Copilot  | Needs your input      | tring
ready      | ▶️ | Copilot  | Ready to continue     | tring
blocked    | ⛔  | Copilot  | Blocked — needs you   | tring
info       | 💬  | Copilot  | Update                | tring
